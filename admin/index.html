<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - AEC GROUP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #0A190F; color: #fff; min-height: 100vh; padding: 20px; }
    h1 { color: #28F064; margin-bottom: 20px; text-align: center; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(40,240,100,0.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { color: #28F064; font-size: 14px; }
    td { font-size: 14px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #28F064; color: #0A190F; }
    .btn-danger { background: #e53e3e; color: #fff; margin-left: 8px; }
    .btn-edit { background: #3498db; color: #fff; margin-right: 8px; }
    input, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; margin-bottom: 10px; }
    label { color: #A0AAB0; font-size: 13px; display: block; margin-bottom: 4px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; background: #28F064; color: #0A190F; border-radius: 8px; display: none; font-weight: bold; }
    .actions { margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <h1>后台管理</h1>
  <div class="card">
    <div class="actions">
      <button class="btn btn-primary" onclick="showAddForm()">+ 添加产品</button>
    </div>
    <table id="productsTable">
      <thead><tr><th>产品名称</th><th>分类</th><th>厚度</th><th>价格</th><th>操作</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- 添加产品表单 -->
<div class="card" id="addForm" style="display:none;">
  <h2 style="color:#28F064;margin-bottom:15px;">添加产品</h2>
  <div class="form-row">
    <div><label>产品名称</label><input id="title" placeholder="BOPP Plain Film"></div>
    <div><label>分类</label><input id="category" placeholder="BOPP Film"></div>
  </div>
  <div class="form-row">
    <div><label>厚度</label><input id="thickness" placeholder="3-75μm"></div>
    <div><label>价格</label><input id="price" placeholder="From $0.8/m²"></div>
  </div>
  <label>描述</label>
  <textarea id="description" rows="3" placeholder="产品描述..."></textarea>
  <div class="actions">
    <button class="btn btn-primary" onclick="saveProduct()">保存</button>
    <button class="btn" style="background:#666;color:#fff;" onclick="hideAddForm()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'napi_ed806cd64eqqmzg2bcu12xkhh55wcsrjjzls65zpk0ucnd5c89ye0pb72bknznc9';
const PROJECT_ID = 'ep-young-rice-af65ccr8';
const DB = 'neondb';

async function sql(query) {
  const url = `https://${PROJECT_ID}.neon.tech/api/v1/sql`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY },
    body: JSON.stringify({ query, params: [] })
  });
  if (!res.ok) throw new Error(await res.text());
  return await res.json();
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#e53e3e' : '#28F064';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function showAddForm() {
  document.getElementById('addForm').style.display = 'block';
}

function hideAddForm() {
  document.getElementById('addForm').style.display = 'none';
}

async function loadProducts() {
  try {
    const data = await sql('SELECT * FROM products WHERE is_active = true ORDER BY sort_order ASC');
    const tbody = document.querySelector('#productsTable tbody');
    tbody.innerHTML = (data.response || []).map(p => `
      <tr>
        <td>${p.title}</td>
        <td>${p.category || '-'}</td>
        <td>${p.thickness || '-'}</td>
        <td>${p.price || '-'}</td>
        <td>
          <button class="btn btn-danger" onclick="deleteProduct(${p.id})">删除</button>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    showToast('加载失败: ' + e.message, 'error');
  }
}

async function saveProduct() {
  const body = {
    title: document.getElementById('title').value,
    category: document.getElementById('category').value,
    thickness: document.getElementById('thickness').value,
    price: document.getElementById('price').value,
    description: document.getElementById('description').value,
    is_active: true,
    sort_order: 0
  };

  try {
    await sql(`INSERT INTO products (title, category, thickness, price, description, is_active, sort_order) VALUES ('${body.title}', '${body.category}', '${body.thickness}', '${body.price}', '${body.description}', true, 0)`);
    showToast('保存成功！');
    hideAddForm();
    loadProducts();
  } catch (e) {
    showToast('保存失败: ' + e.message, 'error');
  }
}

async function deleteProduct(id) {
  if (!confirm('确定删除？')) return;
  try {
    await sql(`DELETE FROM products WHERE id = ${id}`);
    showToast('删除成功！');
    loadProducts();
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

// 初始化
window.onload = function() {
  // 检查 users 表是否存在
  sql('SELECT COUNT(*) FROM users').then(() => {
    loadProducts();
  }).catch(e => {
    showToast('数据库连接失败，请检查 API Key', 'error');
  });
};
</script>
</body>
</html>
