<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>编辑产品 · AEC GROUP 后台</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    /* ── Fixed-width, non-responsive layout ── */
    html, body { min-width: 1100px; background: var(--bg, #0f1117); color: var(--text, #e2e8f0); font-family: 'Inter', sans-serif; margin: 0; }
    .edit-page { width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
    .edit-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; border-bottom: 1px solid var(--border, #2d3748); padding-bottom: 20px; }
    .edit-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text, #e2e8f0); margin: 0; }
    .edit-header .back-btn { padding: 8px 18px; background: transparent; border: 1.5px solid var(--border, #2d3748); border-radius: 7px; color: var(--text, #e2e8f0); cursor: pointer; font-size: .9rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
    .edit-header .back-btn:hover { border-color: var(--gold, #e8c46a); color: var(--gold, #e8c46a); }
    .edit-section { background: var(--bg-card, #181c2a); border: 1px solid var(--border, #2d3748); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
    .edit-section-header { padding: 14px 20px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border, #2d3748); font-weight: 600; font-size: .97rem; color: var(--gold, #e8c46a); display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .edit-section-header .arrow { transition: transform .2s; display: inline-block; }
    .edit-section-header.collapsed .arrow { transform: rotate(-90deg); }
    .edit-section-body { padding: 20px; }
    .edit-section-body.hidden { display: none; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; color: var(--text2, #94a3b8); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .04em; }
    .form-group input[type=text], .form-group select, .form-group textarea {
      width: 100%; box-sizing: border-box; padding: 10px 14px;
      background: rgba(255,255,255,.05); border: 1.5px solid var(--border, #2d3748);
      border-radius: 7px; color: var(--text, #e2e8f0); font-size: .93rem; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green, #28f064); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .rich-editor-toolbar {
      display: flex; align-items: center; gap: 2px; padding: 5px 8px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border, #2d3748);
      border-bottom: none; border-radius: 6px 6px 0 0; flex-wrap: wrap;
    }
    .rich-editor-toolbar button {
      padding: 3px 7px; background: transparent; border: 1px solid transparent;
      border-radius: 4px; color: var(--text, #e2e8f0); cursor: pointer; font-size: 12px;
      line-height: 1.4; transition: background .15s; white-space: nowrap;
    }
    .rich-editor-toolbar button:hover { background: rgba(255,255,255,.12); border-color: var(--border, #2d3748); }
    .rich-font-select { font-size: 12px; padding: 2px 4px; background: rgba(255,255,255,.06); border: 1px solid var(--border, #2d3748); border-radius: 4px; color: var(--text, #e2e8f0); cursor: pointer; max-width: 90px; }
    .rich-color-btn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 22px; border: 1px solid var(--border, #2d3748); border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700; position: relative; overflow: hidden; color: var(--text, #e2e8f0); }
    .rich-sep { width: 1px; height: 18px; background: var(--border, #2d3748); margin: 0 4px; flex-shrink: 0; }
    .rich-editor {
      min-height: 120px; padding: 10px 12px;
      background: var(--bg-input, rgba(255,255,255,.05));
      border: 1px solid var(--border, #2d3748); border-radius: 0 0 6px 6px;
      color: var(--text, #e2e8f0); font-size: 14px; line-height: 1.6; outline: none; resize: vertical; overflow-y: auto;
    }
    .rich-editor-specs { min-height: 200px; }
    .rich-editor:focus { border-color: var(--green, #28f064); box-shadow: 0 0 0 2px rgba(40,240,100,.12); }
    .rich-editor:empty:before { content: attr(data-placeholder); color: var(--text2, #94a3b8); pointer-events: none; }
    .rich-editor ul, .rich-editor ol { padding-left: 20px; margin: 4px 0; }
    .rich-editor h2 { font-size: 1.2em; font-weight: 700; margin: 6px 0 3px; }
    .rich-editor h3 { font-size: 1.05em; font-weight: 600; margin: 5px 0 2px; }
    .rich-editor table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .rich-editor table td, .rich-editor table th { border: 1px solid var(--border, #2d3748); padding: 6px 10px; font-size: 13px; }
    .rich-editor table th { background: rgba(255,255,255,.08); font-weight: 600; }
    .rich-editor a { color: var(--gold, #e8c46a); text-decoration: underline; }
    .rich-editor hr { border: none; border-top: 1px solid var(--border, #2d3748); margin: 8px 0; }
    .save-bar { position: sticky; bottom: 0; background: var(--bg, #0f1117); border-top: 1px solid var(--border, #2d3748); padding: 16px 24px; display: flex; align-items: center; gap: 12px; justify-content: flex-end; z-index: 100; }
    .btn-primary { padding: 10px 28px; background: linear-gradient(135deg, var(--green, #28f064), #1ab54a); border: none; border-radius: 8px; color: #000; font-weight: 700; cursor: pointer; font-size: .95rem; transition: opacity .15s; }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary { padding: 10px 20px; background: transparent; border: 1.5px solid var(--border, #2d3748); border-radius: 8px; color: var(--text, #e2e8f0); cursor: pointer; font-size: .9rem; transition: border-color .15s; }
    .btn-secondary:hover { border-color: var(--text2, #94a3b8); }
    .image-upload-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-upload { padding: 8px 16px; background: rgba(255,255,255,.07); border: 1.5px solid var(--border, #2d3748); border-radius: 7px; cursor: pointer; font-size: .88rem; color: var(--text, #e2e8f0); white-space: nowrap; }
    .image-preview { margin-top: 10px; position: relative; display: inline-block; }
    .image-preview img { max-width: 200px; max-height: 160px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border, #2d3748); }
    .btn-remove-img { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.7); border: none; color: #fff; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 12px; }
    .toast { position: fixed; bottom: 80px; right: 24px; background: var(--green, #28f064); color: #000; padding: 12px 22px; border-radius: 10px; font-weight: 600; font-size: .9rem; display: none; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,.3); }
    .toast.error { background: #e86450; color: #fff; }
    .prod-id-badge { font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: var(--gold, #e8c46a); background: rgba(232,196,106,.12); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(232,196,106,.3); }
    select option { background: #1a1f2e; }
    .flex-1 { flex: 1; }
  </style>
</head>
<body>
<div class="edit-page">
  <div class="edit-header">
    <a href="index.html" class="back-btn">← 返回后台</a>
    <h1 id="editPageTitle">编辑产品</h1>
    <span class="prod-id-badge" id="editIdBadge"></span>
  </div>

  <form id="editForm" onsubmit="return false;">
    <input type="hidden" id="productId">

    <!-- ── 基本信息 ── -->
    <div class="edit-section">
      <div class="edit-section-header" onclick="toggleSection(this)">
        📋 基本信息 · Basic Info <span class="arrow">▼</span>
      </div>
      <div class="edit-section-body">
        <div class="form-row">
          <div class="form-group">
            <label>产品名称(EN) *</label>
            <input type="text" id="productNameEn" required placeholder="e.g. BOPP Anti-Fog Film">
          </div>
          <div class="form-group">
            <label>产品名称(ZH)</label>
            <input type="text" id="productNameZh" placeholder="e.g. BOPP防雾薄膜">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>分类 *</label>
            <select id="productCategory" required></select>
          </div>
          <div class="form-group">
            <label>状态</label>
            <select id="productStatus">
              <option value="active">上架</option>
              <option value="inactive">下架</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>厚度</label>
            <input type="text" id="productThickness" placeholder="3-75μm">
          </div>
          <div class="form-group">
            <label>详情页链接</label>
            <input type="text" id="productDetailLink" placeholder="e.g. bopp-antifog.html">
          </div>
        </div>
        <div class="form-group">
          <label>规格标签（用逗号分隔）</label>
          <input type="text" id="productSpecs" placeholder="High clarity, 250-10000mm, Anti-static">
        </div>
        <div class="form-group">
          <label>产品关键词（用逗号分隔，用于 SEO 及搜索）</label>
          <input type="text" id="productKeywords" placeholder="BOPP film, packaging film, anti-fog, 防雾膜">
        </div>
        <div class="form-group">
          <label>产品图片</label>
          <div class="image-upload-row">
            <label class="btn-upload" for="productImageFile">📁 选择图片</label>
            <input type="file" id="productImageFile" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
            <input type="text" id="productImage" class="flex-1" placeholder="或手动输入图片路径 e.g. images/bopp-film.jpg">
          </div>
          <div class="image-preview" id="imagePreview" style="display:none">
            <img id="imagePreviewImg" src="" alt="预览">
            <button type="button" class="btn-remove-img" onclick="clearImagePreview()">✕</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Overview · 概述 ── -->
    <div class="edit-section">
      <div class="edit-section-header" onclick="toggleSection(this)">
        📝 Overview · 概述 <span class="arrow">▼</span>
      </div>
      <div class="edit-section-body">
        <div class="form-group">
          <label>Overview · 概述(EN) ▼</label>
          <div class="rich-editor-toolbar">
            <select class="rich-font-select" onchange="execRichCmd('productDescEnEditor','fontName',this.value);this.value=''" title="字体">
              <option value="">字体</option><option value="Arial">Arial</option><option value="Times New Roman">Times New Roman</option><option value="Georgia">Georgia</option>
            </select>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescEnEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productDescEnEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productDescEnEditor','underline')"><u>U</u></button>
            <button type="button" onclick="execRichCmd('productDescEnEditor','strikeThrough')"><s>S</s></button>
            <span class="rich-sep"></span>
            <label class="rich-color-btn" title="Color">A<input type="color" onchange="execRichCmd('productDescEnEditor','foreColor',this.value)" style="width:0;height:0;opacity:0;position:absolute"></label>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescEnEditor','justifyLeft')">⬛◻◻</button>
            <button type="button" onclick="execRichCmd('productDescEnEditor','justifyCenter')">◻⬛◻</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescEnEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productDescEnEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <select class="rich-font-select" onchange="execRichCmd('productDescEnEditor','formatBlock',this.value);this.value=''">
              <option value="">段落</option><option value="h2">H2</option><option value="h3">H3</option><option value="p">正文</option>
            </select>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productDescEnEditor')">⊞ Table</button>
            <button type="button" onclick="insertRichLink('productDescEnEditor')">🔗</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescEnEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productDescEnEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescEnEditor','removeFormat')">✕ Fmt</button>
          </div>
          <div id="productDescEnEditor" class="rich-editor" contenteditable="true" data-placeholder="English product overview..."></div>
          <textarea id="productDescEn" style="display:none"></textarea>
        </div>
        <div class="form-group">
          <label>Overview · 概述(ZH) ▼</label>
          <div class="rich-editor-toolbar">
            <select class="rich-font-select" onchange="execRichCmd('productDescZhEditor','fontName',this.value);this.value=''" title="字体">
              <option value="">字体</option><option value="SimSun">宋体</option><option value="Microsoft YaHei">微软雅黑</option><option value="Arial">Arial</option>
            </select>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescZhEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productDescZhEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productDescZhEditor','underline')"><u>U</u></button>
            <span class="rich-sep"></span>
            <label class="rich-color-btn" title="颜色">A<input type="color" onchange="execRichCmd('productDescZhEditor','foreColor',this.value)" style="width:0;height:0;opacity:0;position:absolute"></label>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescZhEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productDescZhEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <select class="rich-font-select" onchange="execRichCmd('productDescZhEditor','formatBlock',this.value);this.value=''">
              <option value="">段落</option><option value="h2">H2</option><option value="h3">H3</option><option value="p">正文</option>
            </select>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productDescZhEditor')">⊞ 表格</button>
            <button type="button" onclick="insertRichLink('productDescZhEditor')">🔗</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescZhEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productDescZhEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productDescZhEditor','removeFormat')">✕ 格式</button>
          </div>
          <div id="productDescZhEditor" class="rich-editor" contenteditable="true" data-placeholder="中文产品概述..."></div>
          <textarea id="productDescZh" style="display:none"></textarea>
        </div>
      </div>
    </div>

    <!-- ── Specifications · 规格参数 ── -->
    <div class="edit-section">
      <div class="edit-section-header" onclick="toggleSection(this)">
        📐 Specifications · 规格参数 <span class="arrow">▼</span>
      </div>
      <div class="edit-section-body">
        <div class="form-group">
          <label>Specifications · 规格参数(EN) ▼ <span style="font-size:11px;opacity:.6">（表格、标题、列表）</span></label>
          <div class="rich-editor-toolbar">
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','underline')"><u>U</u></button>
            <span class="rich-sep"></span>
            <label class="rich-color-btn" title="Color">A<input type="color" onchange="execRichCmd('productTechSpecsEditor','foreColor',this.value)" style="width:0;height:0;opacity:0;position:absolute"></label>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <select class="rich-font-select" onchange="execRichCmd('productTechSpecsEditor','formatBlock',this.value);this.value=''">
              <option value="">段落</option><option value="h2">H2</option><option value="h3">H3</option><option value="h4">H4</option><option value="p">正文</option>
            </select>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productTechSpecsEditor')">⊞ Table</button>
            <button type="button" onclick="insertTechSpecsTemplate('productTechSpecsEditor')" style="color:var(--gold,#e8c46a)">📋 模板</button>
            <button type="button" onclick="insertRichLink('productTechSpecsEditor')">🔗</button>
            <button type="button" onclick="insertRichHRule('productTechSpecsEditor')">─</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productTechSpecsEditor','removeFormat')">✕ Fmt</button>
          </div>
          <div id="productTechSpecsEditor" class="rich-editor rich-editor-specs" contenteditable="true" data-placeholder="Thickness range, width, physical properties, optical properties..."></div>
          <textarea id="productTechSpecs" style="display:none"></textarea>
        </div>
        <div class="form-group">
          <label>Specifications · 规格参数(ZH) ▼</label>
          <div class="rich-editor-toolbar">
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','underline')"><u>U</u></button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productTechSpecsZhEditor')">⊞ 表格</button>
            <button type="button" onclick="insertTechSpecsTemplate('productTechSpecsZhEditor')" style="color:var(--gold,#e8c46a)">📋 模板</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productTechSpecsZhEditor','removeFormat')">✕ 格式</button>
          </div>
          <div id="productTechSpecsZhEditor" class="rich-editor rich-editor-specs" contenteditable="true" data-placeholder="厚度范围、宽度规格、物理性能、光学性能等..."></div>
          <textarea id="productTechSpecsZh" style="display:none"></textarea>
        </div>
      </div>
    </div>

    <!-- ── Applications · 应用领域 ── -->
    <div class="edit-section">
      <div class="edit-section-header" onclick="toggleSection(this)">
        🌐 Applications · 应用领域 <span class="arrow">▼</span>
      </div>
      <div class="edit-section-body">
        <div class="form-group">
          <label>Applications · 应用领域(EN) ▼</label>
          <div class="rich-editor-toolbar">
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','underline')"><u>U</u></button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productApplicationsEnEditor')">⊞ Table</button>
            <button type="button" onclick="insertRichLink('productApplicationsEnEditor')">🔗</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productApplicationsEnEditor','removeFormat')">✕ Fmt</button>
          </div>
          <div id="productApplicationsEnEditor" class="rich-editor" contenteditable="true" data-placeholder="Describe application fields, industries, use cases..."></div>
          <textarea id="productApplicationsEn" style="display:none"></textarea>
        </div>
        <div class="form-group">
          <label>Applications · 应用领域(ZH) ▼</label>
          <div class="rich-editor-toolbar">
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','underline')"><u>U</u></button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productApplicationsZhEditor')">⊞ 表格</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productApplicationsZhEditor','removeFormat')">✕ 格式</button>
          </div>
          <div id="productApplicationsZhEditor" class="rich-editor" contenteditable="true" data-placeholder="描述应用领域、行业、使用场景..."></div>
          <textarea id="productApplicationsZh" style="display:none"></textarea>
        </div>
      </div>
    </div>

    <!-- ── Packaging · 包装信息 ── -->
    <div class="edit-section">
      <div class="edit-section-header" onclick="toggleSection(this)">
        📦 Packaging · 包装信息 <span class="arrow">▼</span>
      </div>
      <div class="edit-section-body">
        <div class="form-group">
          <label>Packaging · 包装信息(EN) ▼</label>
          <div class="rich-editor-toolbar">
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','underline')"><u>U</u></button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productPackagingEnEditor')">⊞ Table</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productPackagingEnEditor','removeFormat')">✕ Fmt</button>
          </div>
          <div id="productPackagingEnEditor" class="rich-editor" contenteditable="true" data-placeholder="Roll width, core size, packing weight, MOQ, storage conditions..."></div>
          <textarea id="productPackagingEn" style="display:none"></textarea>
        </div>
        <div class="form-group">
          <label>Packaging · 包装信息(ZH) ▼</label>
          <div class="rich-editor-toolbar">
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','bold')"><b>B</b></button>
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','italic')"><i>I</i></button>
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','underline')"><u>U</u></button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','insertUnorderedList')">• ≡</button>
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','insertOrderedList')">① ≡</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="insertRichTable('productPackagingZhEditor')">⊞ 表格</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','undo')">↩</button>
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','redo')">↪</button>
            <span class="rich-sep"></span>
            <button type="button" onclick="execRichCmd('productPackagingZhEditor','removeFormat')">✕ 格式</button>
          </div>
          <div id="productPackagingZhEditor" class="rich-editor" contenteditable="true" data-placeholder="卷宽、芯管尺寸、包装重量、最小订购量、存储条件..."></div>
          <textarea id="productPackagingZh" style="display:none"></textarea>
        </div>
      </div>
    </div>
  </form>
</div>

<!-- Sticky save bar -->
<div class="save-bar">
  <button class="btn-secondary" onclick="history.back()">取消</button>
  <button class="btn-primary" onclick="saveEditedProduct()">💾 保存产品</button>
</div>

<div class="toast" id="toast"></div>

<script src="products-data.js"></script>
<script>
// ============ DATA ============
var APP_DATA = { products: [], categories: [] };

function loadData() {
  var sourceProducts = [], sourceCategories = [];
  if (typeof window.productsData !== 'undefined') {
    sourceCategories = window.productsData.categories || [];
    sourceProducts   = window.productsData.products   || [];
  }
  var baseCategories = sourceCategories.length ? sourceCategories : [];
  var savedCategories = null, savedProducts = null, deletedIds = {};
  try {
    var sc = localStorage.getItem('aecAdmin_categories');
    if (sc) savedCategories = JSON.parse(sc);
    var sp = localStorage.getItem('aecAdmin_products');
    if (sp) savedProducts = JSON.parse(sp);
    var sd = localStorage.getItem('aecAdmin_deletedIds');
    if (sd) JSON.parse(sd).forEach(function(id) { deletedIds[id] = true; });
  } catch(e) {}

  if (savedCategories && savedCategories.length) {
    var mergedCats = [], savedCatMap = {};
    savedCategories.forEach(function(c) { savedCatMap[c.id] = c; });
    baseCategories.forEach(function(c) { mergedCats.push(savedCatMap[c.id] || c); });
    savedCategories.forEach(function(c) { if (!mergedCats.some(function(m){return m.id===c.id;})) mergedCats.push(c); });
    APP_DATA.categories = mergedCats;
  } else { APP_DATA.categories = baseCategories; }

  var mergedProducts = [], savedIds = {};
  if (savedProducts && savedProducts.length) { savedProducts.forEach(function(p){ savedIds[p.id]=true; mergedProducts.push(p); }); }
  sourceProducts.forEach(function(p){ if (!savedIds[p.id] && !deletedIds[p.id]) mergedProducts.push(p); });
  APP_DATA.products = mergedProducts;
}

function getCategoryChildren(parentId) {
  return APP_DATA.categories.filter(function(c){ return (c.parentId||null)===(parentId||null); }).sort(function(a,b){ return (a.order||0)-(b.order||0); });
}
function getFlatCategoryList(parentId, depth) {
  depth = depth || 0;
  var result = [];
  getCategoryChildren(parentId).forEach(function(cat) {
    result.push({ cat: cat, depth: depth });
    result = result.concat(getFlatCategoryList(cat.id, depth + 1));
  });
  return result;
}

// ============ UI HELPERS ============
function toggleSection(header) {
  header.classList.toggle('collapsed');
  var body = header.nextElementSibling;
  body.classList.toggle('hidden');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 3500);
}

// ============ RICH EDITOR ============
function execRichCmd(editorId, cmd, value) {
  var el = document.getElementById(editorId);
  if (!el) return;
  el.focus();
  document.execCommand(cmd, false, value || null);
}
function insertRichTable(editorId) {
  var rows = parseInt(prompt('表格行数（含标题行）：', '3') || '0');
  var cols = parseInt(prompt('表格列数：', '3') || '0');
  if (!rows || !cols) return;
  var html = '<table><thead><tr>';
  for (var c = 0; c < cols; c++) html += '<th>标题' + (c+1) + '</th>';
  html += '</tr></thead><tbody>';
  for (var r = 1; r < rows; r++) {
    html += '<tr>';
    for (var cc = 0; cc < cols; cc++) html += '<td>&nbsp;</td>';
    html += '</tr>';
  }
  html += '</tbody></table><p><br></p>';
  var el = document.getElementById(editorId);
  if (el) { el.focus(); document.execCommand('insertHTML', false, html); }
}
function insertRichLink(editorId) {
  var url = prompt('链接地址：', 'https://');
  if (!url) return;
  var text = prompt('显示文字：', url) || url;
  var el = document.getElementById(editorId);
  if (el) { el.focus(); document.execCommand('insertHTML', false, '<a href="' + url + '" target="_blank">' + text + '</a>'); }
}
function insertRichHRule(editorId) {
  var el = document.getElementById(editorId);
  if (el) { el.focus(); document.execCommand('insertHTML', false, '<hr><p><br></p>'); }
}
function insertTechSpecsTemplate(editorId) {
  var html = '<h2>Technical Specifications</h2>' +
    '<table><thead><tr><th>Property</th><th>Value</th><th>Unit</th></tr></thead><tbody>' +
    '<tr><td>Thickness Range</td><td>&nbsp;</td><td>μm</td></tr>' +
    '<tr><td>Width Range</td><td>&nbsp;</td><td>mm</td></tr>' +
    '<tr><td>Core Diameter</td><td>&nbsp;</td><td>mm</td></tr>' +
    '<tr><td>Max Roll Diameter</td><td>&nbsp;</td><td>mm</td></tr>' +
    '</tbody></table>' +
    '<h3>Physical Properties</h3>' +
    '<table><thead><tr><th>Property</th><th>MD</th><th>TD</th><th>Unit</th></tr></thead><tbody>' +
    '<tr><td>Tensile Strength</td><td>&nbsp;</td><td>&nbsp;</td><td>MPa</td></tr>' +
    '<tr><td>Elongation at Break</td><td>&nbsp;</td><td>&nbsp;</td><td>%</td></tr>' +
    '<tr><td>Thermal Shrinkage</td><td>&nbsp;</td><td>&nbsp;</td><td>%</td></tr>' +
    '</tbody></table><p><br></p>';
  var el = document.getElementById(editorId);
  if (el) { el.focus(); document.execCommand('insertHTML', false, html); }
}

// ============ IMAGE ============
function handleImageUpload(event) {
  var file = event.target.files[0];
  if (!file || !file.type.startsWith('image/')) { showToast('请选择图片文件', 'error'); return; }
  if (file.size > 10 * 1024 * 1024) { showToast('图片大小不能超过 10MB', 'error'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('imagePreviewImg').src = e.target.result;
    document.getElementById('imagePreview').style.display = 'block';
    var pi = document.getElementById('productImage');
    if (!pi.value) pi.value = 'images/' + file.name;
  };
  reader.readAsDataURL(file);
}
function clearImagePreview() {
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('imagePreviewImg').src = '';
  document.getElementById('productImage').value = '';
  document.getElementById('productImageFile').value = '';
}

// ============ LOAD PRODUCT ============
function loadProductForEdit() {
  var params = new URLSearchParams(window.location.search);
  var idStr  = params.get('id');
  if (!idStr) { showToast('未指定产品ID', 'error'); return; }
  var id = parseInt(idStr);

  // Category select
  var catSelect = document.getElementById('productCategory');
  catSelect.innerHTML = '<option value="">-- 选择分类 --</option>';
  getFlatCategoryList(null).forEach(function(item) {
    var opt = document.createElement('option');
    opt.value = item.cat.id;
    opt.textContent = '　'.repeat(item.depth) + (item.depth > 0 ? '└─ ' : '') + (item.cat.icon || '') + ' ' + item.cat.nameEn + ' / ' + (item.cat.nameZh || '');
    catSelect.appendChild(opt);
  });

  var p = APP_DATA.products.find(function(x){ return x.id === id; });
  if (!p) { document.getElementById('editPageTitle').textContent = '找不到产品 #' + id; return; }

  document.getElementById('editPageTitle').textContent = p.nameEn || '编辑产品';
  document.getElementById('editIdBadge').textContent = '#' + id;
  document.getElementById('productId').value = id;
  document.getElementById('productNameEn').value = p.nameEn || '';
  document.getElementById('productNameZh').value = p.nameZh || '';
  catSelect.value = p.category || '';
  document.getElementById('productStatus').value = p.status || 'active';
  document.getElementById('productThickness').value = p.thickness || '';
  document.getElementById('productDetailLink').value = p.detailLink || '';
  document.getElementById('productSpecs').value = (p.specs || []).join(', ');
  document.getElementById('productKeywords').value = (p.keywords || []).join(', ');
  document.getElementById('productImage').value = p.image || '';
  if (p.image) {
    document.getElementById('imagePreviewImg').src = p.image;
    document.getElementById('imagePreview').style.display = 'block';
  }
  // Rich editors
  document.getElementById('productDescEnEditor').innerHTML = p.descEn || '';
  document.getElementById('productDescZhEditor').innerHTML = p.descZh || '';
  document.getElementById('productTechSpecsEditor').innerHTML = p.techSpecs || '';
  document.getElementById('productTechSpecsZhEditor').innerHTML = p.techSpecsZh || '';
  document.getElementById('productApplicationsEnEditor').innerHTML = p.applicationsEn || '';
  document.getElementById('productApplicationsZhEditor').innerHTML = p.applicationsZh || '';
  document.getElementById('productPackagingEnEditor').innerHTML = p.packagingEn || '';
  document.getElementById('productPackagingZhEditor').innerHTML = p.packagingZh || '';
}

// ============ SAVE ============
function saveEditedProduct() {
  var id = document.getElementById('productId').value;
  var nameEn   = document.getElementById('productNameEn').value.trim();
  var category = document.getElementById('productCategory').value;
  if (!nameEn)    { showToast('请输入产品英文名称', 'error'); return; }
  if (!category)  { showToast('请选择分类', 'error'); return; }

  function clean(html) { return (html === '<br>' || html === '<br/>') ? '' : html; }
  var descEn        = clean(document.getElementById('productDescEnEditor').innerHTML.trim());
  var descZh        = clean(document.getElementById('productDescZhEditor').innerHTML.trim());
  var techSpecs     = clean(document.getElementById('productTechSpecsEditor').innerHTML.trim());
  var techSpecsZh   = clean(document.getElementById('productTechSpecsZhEditor').innerHTML.trim());
  var applicationsEn = clean(document.getElementById('productApplicationsEnEditor').innerHTML.trim());
  var applicationsZh = clean(document.getElementById('productApplicationsZhEditor').innerHTML.trim());
  var packagingEn   = clean(document.getElementById('productPackagingEnEditor').innerHTML.trim());
  var packagingZh   = clean(document.getElementById('productPackagingZhEditor').innerHTML.trim());

  var specsRaw = document.getElementById('productSpecs').value;
  var specs = specsRaw ? specsRaw.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];
  var keywordsRaw = document.getElementById('productKeywords').value;
  var keywords = keywordsRaw ? keywordsRaw.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];

  var productData = {
    id: parseInt(id),
    nameEn: nameEn,
    nameZh: document.getElementById('productNameZh').value.trim(),
    category: category,
    descEn: descEn, descZh: descZh,
    techSpecs: techSpecs, techSpecsZh: techSpecsZh,
    applicationsEn: applicationsEn, applicationsZh: applicationsZh,
    packagingEn: packagingEn, packagingZh: packagingZh,
    thickness: document.getElementById('productThickness').value.trim(),
    specs: specs, keywords: keywords,
    status: document.getElementById('productStatus').value,
    detailLink: document.getElementById('productDetailLink').value.trim(),
    image: document.getElementById('productImage').value.trim()
  };

  // Merge into savedProducts
  var savedProducts = [];
  try {
    var sp = localStorage.getItem('aecAdmin_products');
    if (sp) savedProducts = JSON.parse(sp);
  } catch(e) {}

  var idx = savedProducts.findIndex(function(p){ return p.id === productData.id; });
  if (idx >= 0) { savedProducts[idx] = productData; }
  else { savedProducts.push(productData); }

  try {
    localStorage.setItem('aecAdmin_products', JSON.stringify(savedProducts));
    showToast('产品已保存 ✅');
    setTimeout(function(){ window.location.href = 'index.html'; }, 1200);
  } catch(e) {
    showToast('保存失败：' + e.message, 'error');
  }
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded', function() {
  loadData();
  loadProductForEdit();
});
</script>
</body>
</html>
